<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Credit Cards | Permanent Save | Admin: adminAjay</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }

  body {
    background: #f0f2f5;
    padding: 20px;
  }

  .admin-topbar {
    max-width: 980px;
    margin: 0 auto 20px auto;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    position: relative;
  }

  .menu-icon {
    background: white;
    width: 48px;
    height: 48px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: all 0.2s;
    border: 1px solid #e2e2e2;
  }

  .menu-icon i {
    font-size: 24px;
    color: #1e2a3a;
  }

  .menu-icon:hover {
    background: #44d38d;
  }
  .menu-icon:hover i {
    color: white;
  }

  .admin-dropdown {
    position: absolute;
    top: 55px;
    right: 0;
    background: white;
    width: 480px;
    max-width: 92vw;
    border-radius: 28px;
    box-shadow: 0 25px 40px -12px rgba(0,0,0,0.25);
    z-index: 1000;
    display: none;
    overflow: hidden;
    border: 1px solid #eef2ff;
  }

  .admin-dropdown.show {
    display: block;
    animation: fadeSlide 0.2s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-10px);}
    to { opacity: 1; transform: translateY(0);}
  }

  .dropdown-header {
    padding: 16px 20px;
    background: #f8fafc;
    border-bottom: 1px solid #eef2f6;
    font-weight: 700;
    font-size: 15px;
    color: #0f172a;
  }

  .login-form {
    padding: 24px 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .login-form input {
    padding: 14px 16px;
    border: 1.5px solid #e2e8f0;
    border-radius: 60px;
    font-size: 14px;
    outline: none;
    background: #ffffff;
  }
  .login-form input:focus {
    border-color: #44d38d;
    box-shadow: 0 0 0 3px rgba(68,211,141,0.2);
  }
  .login-btn {
    background: #0f172a;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 60px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
  }
  .login-btn:hover {
    background: #44d38d;
    color: #111;
  }
  .error-msg {
    font-size: 12px;
    color: #e11d48;
    text-align: center;
    margin-top: 5px;
  }
  .manual-hint {
    font-size: 11px;
    color: #64748b;
    text-align: center;
  }

  .admin-panel {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-height: 70vh;
    overflow-y: auto;
  }

  .admin-section {
    border-top: 1px solid #edf2f7;
    padding-top: 18px;
  }
  .admin-section-title {
    font-weight: 700;
    margin-bottom: 14px;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #1e293b;
  }

  .edit-card-block {
    background: #fefce8;
    border-radius: 24px;
    padding: 16px;
    margin-bottom: 20px;
    border: 1px solid #ffe6b3;
  }
  .edit-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
    border-bottom: 1px dashed #ddd;
    padding-bottom: 8px;
  }
  .img-preview-sm {
    width: 70px;
    border-radius: 12px;
    border: 1px solid #ccc;
  }
  .edit-field {
    margin-bottom: 12px;
  }
  .edit-field label {
    font-size: 12px;
    font-weight: 600;
    display: block;
    margin-bottom: 5px;
  }
  .edit-field input, .edit-field textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 60px;
    border: 1px solid #ccc;
    font-size: 13px;
  }
  .edit-field textarea {
    border-radius: 20px;
  }
  .logo-preview-area {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 6px;
  }
  .small-logo-preview {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    object-fit: contain;
    border: 1px solid #e2e8f0;
    background: white;
    padding: 6px;
  }
  .btn-save-card {
    background: #44d38d;
    border: none;
    padding: 10px 20px;
    border-radius: 40px;
    font-weight: 600;
    margin-top: 12px;
    cursor: pointer;
    width: 100%;
  }
  .btn-delete-card {
    background: #fee2e2;
    color: #b91c1c;
    border: none;
    padding: 8px 16px;
    border-radius: 40px;
    font-weight: 600;
    cursor: pointer;
  }
  .add-card-panel {
    background: #e6f7ec;
    border-radius: 24px;
    padding: 18px;
  }
  .add-card-panel input, .add-card-panel textarea {
    margin-bottom: 10px;
    width: 100%;
  }
  .btn-outline {
    background: white;
    border: 1.5px solid #334155;
    padding: 8px;
    border-radius: 40px;
    font-weight: 500;
  }

  .container {
    max-width: 980px;
    margin: auto;
  }

  .card {
    background: #fff;
    border-radius: 32px;
    overflow: hidden;
    margin-bottom: 28px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  }
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 28px;
    flex-wrap: wrap;
    background: linear-gradient(145deg, #ffffff 0%, #fefefe 100%);
    border-bottom: 1px solid #f0f2f8;
  }
  .left {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
  }
  .card-img {
    width: 140px;
    border-radius: 20px;
    object-fit: cover;
    background: #f8f9fc;
    border: 1px solid #eceff5;
    display: block;
  }
  .content h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 0;
    color: #0a2540;
  }
  .opposite-logo {
    display: flex;
    align-items: center;
    background: #f8fafc;
    border-radius: 60px;
    padding: 6px 16px 6px 10px;
    gap: 10px;
    border: 1px solid #eef2f8;
  }
  .opposite-logo img {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    object-fit: contain;
    background: white;
    padding: 6px;
    border: 1px solid #e9eef3;
  }
  .opposite-logo span {
    font-size: 13px;
    font-weight: 600;
    color: #1e2a3e;
  }

  .replacement-area {
    padding: 20px 28px 12px 28px;
    background: #fbfeff;
    border-bottom: 1px solid #eef2f8;
  }
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .info-block {
    background: #ffffff;
    border-radius: 24px;
    padding: 16px 20px;
    border: 1px solid #eef2fa;
  }
  .info-header {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #0f2b3d;
    border-left: 4px solid #44d38d;
    padding-left: 12px;
  }
  .info-header i {
    color: #44d38d;
  }
  .info-text {
    font-size: 13px;
    color: #2c3e50;
    line-height: 1.55;
  }
  .info-text ul {
    margin-left: 18px;
    margin-top: 6px;
  }
  .action-buttons-row {
    display: flex;
    justify-content: flex-end;
    gap: 16px;
    padding: 18px 28px 24px 28px;
    border-top: 1px solid #edf2f8;
  }
  .btn-action {
    padding: 12px 32px;
    border-radius: 60px;
    font-size: 14px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    cursor: pointer;
    border: none;
  }
  .btn-apply {
    background: #44d38d;
    color: #111;
  }
  .btn-apply:hover {
    background: #2bb673;
  }
  .btn-share {
    background: #fff;
    border: 1.8px solid #1e293b;
    color: #1e293b;
  }

  @media (max-width: 780px) {
    .info-grid { grid-template-columns: 1fr; }
    .action-buttons-row { justify-content: center; flex-direction: column; align-items: stretch; }
    .top { flex-direction: column; align-items: stretch; }
    .left { justify-content: center; flex-direction: column; align-items: center; }
    .opposite-logo { justify-content: center; align-self: center; }
  }

  .toast-msg {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    color: white;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 13px;
    z-index: 1200;
  }
</style>
</head>
<body>

<div class="admin-topbar">
  <div class="menu-icon" id="menuIcon">
    <i class="fas fa-bars"></i>
  </div>
  <div class="admin-dropdown" id="adminDropdown">
    <div class="dropdown-header">
      <i class="fas fa-crown"></i> Admin Dashboard
    </div>
    <div id="dropdownContent"></div>
  </div>
</div>

<div class="container" id="cardsContainer"></div>

<script>
  // ======================== PERMANENT STORAGE WITH FALLBACK ========================
  const STORAGE_KEY = "PermanentCreditCardsData";
  const SESSION_KEY = "adminLoggedInPermanent";

  // Default Cards (only used if NO data exists at all)
  const DEFAULT_CARDS = [
    {
      id: "default_0",
      img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTEMqQouyL2waMmefYVKgRO0AFMqkxb33uUxWwQzVrm&s",
      title: "Flipkart Axis Bank Credit Card",
      applyLink: "https://leads.goldenteam.in/?h=R2ljaUhJaTRmUW0vT29KOEMzT1pkOUNXSExobnZESjdSeWNXdEVQeXo5ND0=",
      eligibility: "• Age: 21-60 years\n• Income: ₹3.6L per annum\n• CIBIL Score: 750+\n• Indian Resident",
      feesCharges: "• Joining Fee: ₹499 + GST\n• Annual Fee: ₹499 (waiver on ₹2L spends)\n• Interest: 3.5% per month",
      smallLogo: "https://asset21.ckassets.com/resources/image/stores/kotak-cashback-plus-credit-card-1774518540.png",
      logoLabel: "Axis Bank"
    },
    {
      id: "default_1",
      img: "https://media.banksathi.com/products/elViellnaDYvSFdQb2k3MGhFaWxxbVhiVnhadENyb0g0YTdBTVFEU1EyTT0_3D.jpg",
      title: "HDFC Bank Credit Card",
      applyLink: "https://leads.goldenteam.in/?h=NEtFOUEyWHZwTDc1KzhNMUNqSnJGSHZZN3gyQXNLamt5cDFzUUM4K0FPOD0=",
      eligibility: "• Age: 21-60 years\n• Income: ₹2.5L per annum\n• Good credit history",
      feesCharges: "• Joining Fee: ₹0 (LTF)\n• Annual Fee: ₹0 (Lifetime Free)\n• Cash advance fee: ₹500",
      smallLogo: "https://asset21.ckassets.com/resources/image/stores/kotak-cashback-plus-credit-card-1774518540.png",
      logoLabel: "HDFC Bank"
    },
    {
      id: "default_2",
      img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQDPTDt3zgBGCRGBE4ACmXg130_U9AQdr_6nA&s",
      title: "IDFC Fast Bank Credit Card",
      applyLink: "https://leads.goldenteam.in/?h=SkNpZVd0MkJjekY0Z2MrRllINjdabDNnckQ4QjdzeUFqOElVcFo2WGo0WT0=",
      eligibility: "• Age: 23-65 years\n• Income: ₹4L per annum\n• Work experience: 2 years",
      feesCharges: "• Joining Fee: ₹199 + GST\n• Annual Fee: ₹199 (waiver on ₹1L spend)\n• Finance charges: 3.4%",
      smallLogo: "https://asset21.ckassets.com/resources/image/stores/kotak-cashback-plus-credit-card-1774518540.png",
      logoLabel: "IDFC First"
    },
    {
      id: "default_3",
      img: "https://piceapp.com/blogs/wp-content/uploads/2025/12/AU-Small-Finance-Bank-LIT-Credit-Card-Lifetime-Free-Cardpng.png",
      title: "AU Bank Credit Card",
      applyLink: "https://leads.goldenteam.in/?h=Yms4VXhURHZSNHNEazJWM0tpSURjZElRU2RyK0pBV2JGYTQyenQvd3BxVT0=",
      eligibility: "• Age: 21-60 years\n• Monthly Income: ₹25,000+\n• CIBIL 730+ preferred",
      feesCharges: "• Joining Fee: ₹0 (LTF)\n• Annual Fee: Nil first year\n• Interest: 3.49% per month",
      smallLogo: "https://asset21.ckassets.com/resources/image/stores/kotak-cashback-plus-credit-card-1774518540.png",
      logoLabel: "AU Bank"
    }
  ];

  let cardsData = [];
  let isLoggedIn = localStorage.getItem(SESSION_KEY) === "true";

  // Load data - PERMANENT until delete is clicked
  function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        cardsData = JSON.parse(saved);
        if (!Array.isArray(cardsData)) cardsData = [];
      } catch(e) { cardsData = []; }
    }
    
    if (!cardsData.length) {
      cardsData = JSON.parse(JSON.stringify(DEFAULT_CARDS));
      saveData();
    }
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cardsData));
    console.log("Data saved permanently. Total cards:", cardsData.length);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function formatWithBullets(text) {
    if (!text) return "Not specified";
    if (text.includes('•')) {
      let items = text.split('\n').filter(l => l.trim().startsWith('•')).map(l => `<li>${escapeHtml(l.trim().substring(1).trim())}</li>`);
      if (items.length) return `<ul>${items.join('')}</ul>`;
    }
    return `<div style="white-space:pre-line;">${escapeHtml(text)}</div>`;
  }

  function shareCard(title, url) {
    const text = `✨ Check out ${title} credit card! ✨\nApply: ${url}`;
    if (navigator.share) {
      navigator.share({ title, text, url }).catch(() => showToast("Share cancelled"));
    } else {
      navigator.clipboard.writeText(text).then(() => showToast(`🔗 ${title} link copied!`));
    }
  }

  function showToast(msg) {
    let toast = document.createElement("div");
    toast.className = "toast-msg";
    toast.innerHTML = `<i class="fas fa-share-alt"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  function renderCards() {
    const container = document.getElementById("cardsContainer");
    if (!container) return;
    container.innerHTML = "";
    if (!cardsData.length) {
      container.innerHTML = `<div style="background:white; border-radius:32px; padding:50px; text-align:center;">No cards. Admin can add.</div>`;
      return;
    }
    cardsData.forEach(card => {
      const logo = card.smallLogo || "https://asset21.ckassets.com/resources/image/stores/kotak-cashback-plus-credit-card-1774518540.png";
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <div class="top">
          <div class="left">
            <img class="card-img" src="${escapeHtml(card.img)}" onerror="this.src='https://placehold.co/200x120?text=Card'">
            <div class="content"><h2>${escapeHtml(card.title)}</h2></div>
          </div>
          <div class="opposite-logo">
            <img src="${escapeHtml(logo)}" onerror="this.src='https://asset21.ckassets.com/resources/image/stores/kotak-cashback-plus-credit-card-1774518540.png'">
            <span>${escapeHtml(card.logoLabel || "Partner")}</span>
          </div>
        </div>
        <div class="replacement-area">
          <div class="info-grid">
            <div class="info-block">
              <div class="info-header"><i class="fas fa-check-circle"></i> ELIGIBILITY CRITERIA</div>
              <div class="info-text">${formatWithBullets(card.eligibility)}</div>
            </div>
            <div class="info-block">
              <div class="info-header"><i class="fas fa-file-invoice-dollar"></i> FEES AND LIST OF CHARGES</div>
              <div class="info-text">${formatWithBullets(card.feesCharges)}</div>
            </div>
          </div>
        </div>
        <div class="action-buttons-row">
          <a href="${escapeHtml(card.applyLink)}" class="btn-action btn-apply" target="_blank"><i class="fas fa-bolt"></i> Apply now</a>
          <button class="btn-action btn-share share-btn" data-title="${escapeHtml(card.title)}" data-link="${escapeHtml(card.applyLink)}"><i class="fas fa-share-alt"></i> Share</button>
        </div>
      `;
      container.appendChild(div);
    });
    document.querySelectorAll(".share-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        shareCard(btn.getAttribute("data-title"), btn.getAttribute("data-link"));
      });
    });
  }

  // ======================== ADMIN PANEL with NEW PASSWORD: adminAjay ========================
  function buildAdminPanel() {
    const container = document.getElementById("dropdownContent");
    if (!container) return;

    if (!isLoggedIn) {
      container.innerHTML = `
        <div class="login-form">
          <input type="text" id="adminUser" placeholder="Username" autocomplete="off">
          <input type="password" id="adminPass" placeholder="Password" autocomplete="off">
          <button class="login-btn" id="doLoginBtn">🔐 Admin Login</button>
          <div class="error-msg" id="loginErrorMsg"></div>
          <div class="manual-hint"><i class="fas fa-lock"></i> Manual entry: username: admin | password: adminAjay</div>
        </div>
      `;
      document.getElementById("doLoginBtn")?.addEventListener("click", () => {
        const user = document.getElementById("adminUser").value;
        const pass = document.getElementById("adminPass").value;
        // NEW CREDENTIALS: admin / adminAjay
        if (user === "admin" && pass === "adminAjay") {
          localStorage.setItem(SESSION_KEY, "true");
          isLoggedIn = true;
          buildAdminPanel();
          renderCards();
          document.getElementById("adminDropdown").classList.remove("show");
          alert("✅ Admin Access Granted! Password: adminAjay");
        } else {
          document.getElementById("loginErrorMsg").innerText = "❌ Invalid credentials. Use admin / adminAjay";
        }
      });
      return;
    }

    // Logged in admin panel
    let html = `<div class="admin-panel">
      <div class="add-card-panel">
        <div class="admin-section-title"><i class="fas fa-plus-circle"></i> ➕ ADD NEW CARD (Permanent Save)</div>
        <input type="text" id="newTitle" placeholder="Card Title">
        <input type="text" id="newImg" placeholder="Card Image URL">
        <input type="text" id="newApplyLink" placeholder="Apply Link">
        <input type="text" id="newSmallLogo" placeholder="Logo URL" value="https://asset21.ckassets.com/resources/image/stores/kotak-cashback-plus-credit-card-1774518540.png">
        <input type="text" id="newLogoLabel" placeholder="Logo Label" value="Partner">
        <textarea id="newEligibility" rows="2" placeholder="Eligibility (use • bullets)"></textarea>
        <textarea id="newFees" rows="2" placeholder="Fees and Charges"></textarea>
        <button id="addNewCardBtn" class="btn-save-card" style="background:#3b82f6;">+ Save Card Permanently</button>
      </div>
      <div class="admin-section">
        <div class="admin-section-title"><i class="fas fa-edit"></i> ✏️ EDIT / DELETE CARDS (Changes Save Forever)</div>`;
    
    cardsData.forEach((card, idx) => {
      html += `<div class="edit-card-block">
        <div class="edit-card-header"><span>${escapeHtml(card.title)}</span><img src="${escapeHtml(card.img)}" class="img-preview-sm"></div>
        <div class="edit-field"><label>Image URL</label><input type="text" id="edit_img_${idx}" value="${escapeHtml(card.img)}"></div>
        <div class="edit-field"><label>Title</label><input type="text" id="edit_title_${idx}" value="${escapeHtml(card.title)}"></div>
        <div class="edit-field"><label>Apply Link</label><input type="text" id="edit_link_${idx}" value="${escapeHtml(card.applyLink)}"></div>
        <div class="edit-field"><label>Logo URL</label><input type="text" id="edit_logo_${idx}" value="${escapeHtml(card.smallLogo || '')}"></div>
        <div class="edit-field"><label>Logo Label</label><input type="text" id="edit_label_${idx}" value="${escapeHtml(card.logoLabel || '')}"></div>
        <div class="edit-field"><label>Eligibility</label><textarea rows="2" id="edit_elig_${idx}">${escapeHtml(card.eligibility || '')}</textarea></div>
        <div class="edit-field"><label>Fees & Charges</label><textarea rows="2" id="edit_fees_${idx}">${escapeHtml(card.feesCharges || '')}</textarea></div>
        <button class="btn-save-card saveCardBtn" data-idx="${idx}">💾 Save Changes (Permanent)</button>
        <button class="btn-delete-card deleteCardBtn" data-idx="${idx}" style="margin-top:8px;">🗑️ Permanently Delete Card</button>
      </div>`;
    });
    
    html += `<div style="display:flex; gap:12px; margin-top:8px;">
        <button id="resetDefaultBtn" class="btn-outline">⟳ Reset to Default (Careful)</button>
        <button id="logoutBtn" class="btn-outline" style="background:#fee2e2;">🚪 Logout</button>
      </div></div>`;
    container.innerHTML = html;

    // Save edited card
    document.querySelectorAll(".saveCardBtn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const idx = parseInt(btn.getAttribute("data-idx"));
        cardsData[idx] = {
          ...cardsData[idx],
          img: document.getElementById(`edit_img_${idx}`).value,
          title: document.getElementById(`edit_title_${idx}`).value,
          applyLink: document.getElementById(`edit_link_${idx}`).value,
          smallLogo: document.getElementById(`edit_logo_${idx}`).value,
          logoLabel: document.getElementById(`edit_label_${idx}`).value,
          eligibility: document.getElementById(`edit_elig_${idx}`).value,
          feesCharges: document.getElementById(`edit_fees_${idx}`).value,
        };
        saveData();
        renderCards();
        alert("✅ Changes saved permanently!");
      });
    });

    // Delete card
    document.querySelectorAll(".deleteCardBtn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const idx = parseInt(btn.getAttribute("data-idx"));
        if (confirm(`Delete "${cardsData[idx].title}" permanently?`)) {
          cardsData.splice(idx, 1);
          saveData();
          renderCards();
          buildAdminPanel();
          alert("Card deleted permanently.");
        }
      });
    });

    // Add new card
    document.getElementById("addNewCardBtn")?.addEventListener("click", () => {
      const title = document.getElementById("newTitle").value.trim();
      const img = document.getElementById("newImg").value.trim();
      if (!title || !img) return alert("Title and Image URL required");
      const newCard = {
        id: "card_" + Date.now(),
        img, title,
        applyLink: document.getElementById("newApplyLink").value.trim() || "#",
        smallLogo: document.getElementById("newSmallLogo").value.trim() || "https://asset21.ckassets.com/resources/image/stores/kotak-cashback-plus-credit-card-1774518540.png",
        logoLabel: document.getElementById("newLogoLabel").value.trim() || "Partner",
        eligibility: document.getElementById("newEligibility").value.trim() || "• Age 21+\n• Valid KYC",
        feesCharges: document.getElementById("newFees").value.trim() || "• As per bank norms"
      };
      cardsData.push(newCard);
      saveData();
      renderCards();
      buildAdminPanel();
      alert("✅ New card added and saved permanently!");
    });

    // Reset to default (only if user confirms)
    document.getElementById("resetDefaultBtn")?.addEventListener("click", () => {
      if (confirm("⚠️ WARNING: This will delete ALL your added cards and reset to original 4 cards. This cannot be undone. Are you sure?")) {
        cardsData = JSON.parse(JSON.stringify(DEFAULT_CARDS));
        saveData();
        renderCards();
        buildAdminPanel();
        alert("Reset to default cards. Your previous data is gone.");
      }
    });

    document.getElementById("logoutBtn")?.addEventListener("click", () => {
      localStorage.setItem(SESSION_KEY, "false");
      isLoggedIn = false;
      renderCards();
      buildAdminPanel();
      alert("Logged out");
    });
  }

  // Menu toggle
  const menuIcon = document.getElementById("menuIcon");
  const dropdown = document.getElementById("adminDropdown");
  menuIcon?.addEventListener("click", (e) => {
    e.stopPropagation();
    dropdown.classList.toggle("show");
    buildAdminPanel();
  });
  document.addEventListener("click", (e) => {
    if (!menuIcon?.contains(e.target) && !dropdown?.contains(e.target)) dropdown?.classList.remove("show");
  });

  loadData();
  renderCards();
  buildAdminPanel();
</script>
</body>
</html>
